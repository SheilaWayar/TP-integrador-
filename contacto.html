<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Sheila Wayar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-contacto">
    <div class="contenedor-form">
        <h2>Contactame</h2>
        <form action="Registro" method="post" class="form-contacto">
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required minlength="3">
            
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="Ej: 387 123 4567" required>
            
            <label for="motivo">Motivo de Consulta:</label>
            <select id="motivo" name="motivo" required>
                <option value="">Seleccioná una opción</option>
                <option value="Consulta_General">Consulta General</option>
                <option value="Presupuesto">Presupuesto / Solicitud</option>
                <option value="Soporte">Soporte</option>
            </select>
            
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" placeholder="Escribí tu mensaje..." minlength="10" required></textarea>
            
            <button type="submit" class="boton-cta">Enviar mensaje</button>
        </form>
        <a href="index.html" class="link-volver">←
